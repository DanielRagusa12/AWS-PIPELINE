<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO Field Log</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="page-shell">
        <section class="hero" aria-labelledby="page-title">
            <p class="eyebrow">Near-Earth Object Field Log</p>
            <h1 id="page-title">Close approaches this week</h1>
            <p class="hero-copy">NASA NeoWs observations ranked by size, distance, speed, and scale against familiar vertical references.</p>

            <div class="summary-grid" aria-label="Dataset summary">
                <article class="summary-card">
                    <span class="summary-label">Window</span>
                    <strong id="windowRange">Loading...</strong>
                </article>
                <article class="summary-card">
                    <span class="summary-label">Showing</span>
                    <strong id="returnedCount">--</strong>
                </article>
                <article class="summary-card">
                    <span class="summary-label">Largest</span>
                    <strong id="largestNeo">--</strong>
                </article>
                <article class="summary-card">
                    <span class="summary-label">Closest Pass</span>
                    <strong id="closestNeo">--</strong>
                </article>
            </div>
        </section>

        <section class="controls" aria-label="Sort controls">
            <div>
                <p class="section-kicker">Sort</p>
                <h2>Reorder observations.</h2>
            </div>
            <div id="sortControls" class="sort-controls"></div>
        </section>

        <section id="statusMessage" class="status-message" role="status">
            <span class="loader"></span>
            Loading this week's NEO data...
        </section>

        <section id="neoGrid" class="neo-grid" aria-label="Near-Earth object cards"></section>
    </main>

    <script src="main.js"></script>
</body>
</html>
